<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#126a5b">
  <title>利益シミュレーター</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --ink: #17212b;
      --muted: #64717f;
      --line: #d8e0e7;
      --accent: #126a5b;
      --accent-soft: #e6f4ef;
      --blue-soft: #eaf1ff;
      --blue: #1f6feb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101820;
        --surface: #182331;
        --ink: #eef3f7;
        --muted: #a4b0bb;
        --line: #334252;
        --accent: #45b39f;
        --accent-soft: #123326;
        --blue-soft: #172642;
        --blue: #77a9ff;
      }
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(860px, calc(100% - 28px));
      padding: 26px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 6vw, 38px);
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }
    a {
      display: grid;
      min-height: 190px;
      align-content: space-between;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: inherit;
      padding: 18px;
      text-decoration: none;
    }
    a:first-child { background: var(--blue-soft); }
    a:last-child { background: var(--accent-soft); }
    strong {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }
    span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .go {
      color: var(--accent);
      font-weight: 900;
    }
    a:first-child .go { color: var(--blue); }
    @media (max-width: 680px) {
      body { place-items: stretch; }
      main { width: 100%; padding: 18px 14px; }
      .choices { grid-template-columns: 1fr; }
      a { min-height: 148px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>利益シミュレーター</h1>
    <p>使う場面に合わせて、PC版かスマホ版を選んでください。</p>
    <div class="choices">
      <a href="./desktop.html">
        <div>
          <strong>PC版</strong>
          <span>大きい表で価格帯を比較し、複数行を選んでスプレッドシートへコピーする画面。</span>
        </div>
        <div class="go">PC版を開く</div>
      </a>
      <a href="./mobile.html">
        <div>
          <strong>スマホ版</strong>
          <span>店頭で仕入れ上限とOK候補を素早く見るための、縦長で押しやすい画面。</span>
        </div>
        <div class="go">スマホ版を開く</div>
      </a>
    </div>
  </main>
</body>
</html>
